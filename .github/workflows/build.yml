name: Build and Release Snag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  compile:
    name: Compile on ${{ matrix.os }}
  
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: snag-linux
          - os: windows-latest
            artifact_name: snag-windows.exe

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp rich questionary pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --onefile --name snag src/main.py

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pyinstaller --onefile --name snag src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/snag*

  release:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            snag-linux/snag
            snag-windows.exe/snag.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}